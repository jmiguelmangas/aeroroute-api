name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: aeroroute_test
          POSTGRES_USER: aeroroute
          POSTGRES_PASSWORD: aeroroute
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aeroroute -d aeroroute_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      AEROROUTE_TEST_DATABASE_URL: postgresql+asyncpg://aeroroute:aeroroute@localhost:5432/aeroroute_test
      AEROROUTE_TEST_DATABASE_SYNC_URL: postgresql+psycopg://aeroroute:aeroroute@localhost:5432/aeroroute_test
    steps:
      - uses: actions/checkout@v4
      - name: Check out pinned optimizer dependency
        run: |
          git clone https://github.com/jmiguelmangas/aeroroute-optimizer.git ../aeroroute-optimizer
          git -C ../aeroroute-optimizer checkout 000b3c662d26d50899e9c2efa41968d5e02d4197
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: make check
