name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out pinned optimizer dependency
        run: |
          git clone --depth 1 https://github.com/jmiguelmangas/aeroroute-optimizer.git ../aeroroute-optimizer
          git -C ../aeroroute-optimizer checkout 5bc033c6f2809b059fe27e13f617559c5e59e063
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: make check
