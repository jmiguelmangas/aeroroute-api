name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: aeroroute-api
      - uses: actions/checkout@v4
        with:
          repository: jmiguelmangas/aeroroute-optimizer
          ref: 5bc033c
          path: aeroroute-optimizer
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: make check
        working-directory: aeroroute-api
